[project]
name = "cowork-server"
version = "0.1.0"
description = "FastAPI backend for the Minds Cowork desktop app"
readme = "README.md"
license = "LicenseRef-Proprietary"
requires-python = ">=3.12"
authors = [
    { name = "MindsDB Inc", email = "admin@mindsdb.com" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Framework :: FastAPI",
    "Operating System :: OS Independent",
]
dependencies = [
    "anton",
    "cryptography>=48.0.0",
    "fastapi>=0.136.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.14.1",
    "python-multipart>=0.0.28",
    "sqlmodel>=0.0.38",
    "uvicorn>=0.47.0",
]

[project.optional-dependencies]
hermes = ["hermes-agent"]

[project.urls]
Homepage = "https://github.com/mindsdb/cowork-server"
Repository = "https://github.com/mindsdb/cowork-server"
Issues = "https://github.com/mindsdb/cowork-server/issues"

[project.scripts]
cowork-server = "cowork.cli:main"
cowork-dev-setup = "cowork.cli:dev_setup_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cowork"]

[tool.uv.sources]
anton = { git = "https://github.com/mindsdb/anton.git" }
hermes-agent = { git = "https://github.com/NousResearch/hermes-agent.git" }
