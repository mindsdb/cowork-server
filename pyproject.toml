[project]
name = "cowork-server"
version = "0.1.6"
description = "FastAPI backend for the MindsHub Cowork desktop app"
readme = "README.md"
license = "LicenseRef-Proprietary"
requires-python = ">=3.12,<3.14"
authors = [
    { name = "MindsDB Inc", email = "admin@mindsdb.com" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Framework :: FastAPI",
    "Operating System :: OS Independent",
]
dependencies = [
    "alembic>=1.17.0",
    "anton-agent>=2.26.6.15.1,<3",
    "cryptography>=48.0.0",
    "fastapi>=0.136.1",
    "hermes-agent>=0.15.2,<1",
    "httpx>=0.27",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.14.1",
    "python-multipart>=0.0.28",
    "sqlmodel>=0.0.38",
    "uvicorn>=0.47.0",
]

[project.urls]
Homepage = "https://github.com/mindsdb/cowork-server"
Repository = "https://github.com/mindsdb/cowork-server"
Issues = "https://github.com/mindsdb/cowork-server/issues"

[project.scripts]
cowork-server = "cowork.cli:main"
cowork-dev-setup = "cowork.cli:dev_setup_main"

[project.optional-dependencies]
channels = [
    "slack-sdk>=3.27.0",
    "aiohttp>=3.9.0",
    "discord.py>=2.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cowork"]

[tool.uv.sources]
anton-agent = { git = "https://github.com/mindsdb/anton.git", branch = "main" }
hermes-agent = { git = "https://github.com/NousResearch/hermes-agent.git" }

[dependency-groups]
dev = [
    "alembic>=1.18.4",
    "pytest>=9.0.3",
]
