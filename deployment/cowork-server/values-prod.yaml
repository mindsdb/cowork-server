deployment:
  ingress:
    enabled: true
    name: cowork-server
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://console.mindshub.ai, https://mdb.ai, https://hub.mindsdb.com"
      nginx.ingress.kubernetes.io/auth-url: "http://auth.prod.svc.cluster.local:80/v1/authenticate/"
    hosts:
      - host: cowork.mindshub.ai
        enableMultiPath: true
        paths:
          - path: /
            serviceName: cowork-server
            servicePort: 80

  extraEnvs:

    - name: ENV
      value: "prod"

    - name: LOG_LEVEL
      value: "WARNING"

    # Org-mode identity enforcement. 'enforce': requests without identity
    # headers are rejected with 401.
    - name: COWORK_IDENTITY_ENFORCE
      value: "enforce"
