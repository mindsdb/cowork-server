{{/*
Ephemeral Secret for PR environments.

Gated behind .Values.ephemeral (OFF by default). dev/staging/prod continue
to source `cowork-db` externally.

Owned resource:
  - cowork-db  (PostgreSQL connection URI, points at the shared per-PR-env
                Postgres release deployed by argocd-envs; the parent chart's
                postgres-app.yaml provisions a `cowork` database via initdb
                script.)

`mindsdb-secrets` is NOT rendered here. That Secret is owned by the
mindshub_inference chart's ephemeral-secrets template (creationPolicy: Owner
ExternalSecret pulling from AWS Secrets Manager). Both cowork-server and
mindshub_inference reference the same in-namespace Secret.
*/}}
{{- if .Values.ephemeral }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cowork-db
  labels:
    app.kubernetes.io/part-of: auth-stack
    pr-env.mindsdb.com/managed-by: cowork-server-chart
type: Opaque
stringData:
  database_uri: "postgresql://auth:pr-ephemeral@postgres-postgresql:5432/cowork"
{{- end }}
