name: Dev - Build and Deploy on PR

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

defaults:
  run:
    shell: bash

# Cancel any existing runs of this workflow on the same branch/pr
# We always want to build/deploy/test a new commit over an older one
concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:

  run-unit-tests:
    # Runs unit tests
    uses: ./.github/workflows/tests-unit.yml

  # Looks for labels like "deploy-to-<env>" attached to a PR, so we can deploy to those envs
  get-deploy-labels:
    runs-on: ubuntu-latest
    outputs:
      deploy-envs: ${{ steps.get-labels.outputs.deploy-envs }}
    steps:
      - name: Pull MindsDB Github Actions
        uses: actions/checkout@v4
        with:
          repository: mindsdb/github-actions
          path: github-actions
      - id: get-labels
        uses: ./github-actions/get-deploy-labels

  filter-deploy-envs:
    needs: [get-deploy-labels]
    runs-on: ubuntu-latest
    outputs:
      deploy-envs: ${{ steps.filter.outputs.deploy-envs }}
    steps:
      - name: Drop prod + staging from PR-label matrix
        id: filter
        env:
          RAW_ENVS: ${{ needs.get-deploy-labels.outputs.deploy-envs }}
        run: |
          set -euo pipefail
          # prod ships from release.published; staging ships from push:main.
          # Labels for those envs should be no-ops on PRs to avoid clobbering shared infra.
          FILTERED="$(printf '%s' "$RAW_ENVS" | jq -c '[ .[] | select(. != "prod" and . != "staging") ]')"
          echo "deploy-envs=${FILTERED}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [run-unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build package
        run: uv build

      - name: Verify package imports
        run: uv run python -c "from cowork.server import app"
