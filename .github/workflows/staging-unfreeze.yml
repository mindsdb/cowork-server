name: Staging Unfreeze

# Unlocks the staging branch when the weekly release PR (staging→main)
# is merged. This way devs can start merging to staging again as soon
# as the release ships — no arbitrary Monday morning wait.
#
# Manual override: use the "Run workflow" button to unfreeze staging
# at any time (e.g. emergency hotfix during freeze).

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unfreeze-staging:
    # Only run when a staging→main PR is merged (not just closed)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'staging')
    runs-on: ubuntu-latest
    steps:
      - name: Validate release automation token
        env:
          RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$RELEASE_AUTOMATION_TOKEN" ]; then
            echo "::error::RELEASE_AUTOMATION_TOKEN must be configured with Administration: write and Contents: write permissions."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}

      - name: Unlock staging branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          script: |
            const branch = 'staging';
            const setBranchLock = require('./.github/scripts/set-branch-lock');
            await setBranchLock({ github, context, core, branch, locked: false });

            const prNumber = context.payload.pull_request?.number ?? 'manual';
            core.summary.addRaw(
              `## Staging branch UNFROZEN\n\n` +
              `The \`${branch}\` branch has been **unfrozen** ` +
              `at ${new Date().toISOString()} (triggered by PR #${prNumber}).`
            );
            await core.summary.write();
            console.log(`staging branch UNFROZEN (PR #${prNumber})`);

      - name: Sync main back into staging
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git config user.name "mindsdb-release-automation"
          git config user.email "release-automation@mindsdb.com"
          git fetch origin main staging
          git checkout -B staging origin/staging

          if git merge-base --is-ancestor origin/main HEAD; then
            echo "staging already contains main."
            exit 0
          fi

          git merge --no-ff origin/main -m "Sync main back into staging after release"
          git push origin HEAD:staging
