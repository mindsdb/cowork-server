name: Publish to PyPI

permissions:
  contents: read

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  unit-tests:
    uses: ./.github/workflows/tests-unit.yml

  publish:
    name: Build and publish to PyPI
    needs: unit-tests
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read   # required to checkout private repo
      id-token: write  # required for trusted publisher (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1))
          ")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publisher (OIDC) — no API token needed.
        # Configure at: https://pypi.org/manage/project/cowork-server/settings/publishing/
