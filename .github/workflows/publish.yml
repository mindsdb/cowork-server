name: Auto-release and publish to PyPI

# Thin caller: the shared release/publish machinery lives in
# publish-pypi.yml (one CalVer computation, tag/release, build, publish);
# this file only decides WHEN it runs and that the stream is stable.

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-publish:
    # workflow_dispatch can be pointed at any ref; only main commits may
    # cut a stable release.
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-pypi.yml
    with:
      prerelease: false
